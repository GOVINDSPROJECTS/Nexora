version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexora-app
    container_name: nexora-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - nexora-network

  db:
    image: mysql:8.0
    container_name: nexora-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - nexora-network

  redis:
    image: redis:alpine
    container_name: nexora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - nexora-network

networks:
  nexora-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
